<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />

            }

            }
            .nav a {
                color: #2c3e50;
                text-decoration: none;
                font-weight: bold;
            }
            .banner {
                background: #3498db;
                color: white;
                padding: 60px 20px;
                text-align: center;
                border-radius: 10px;
            }
            .content {
                margin: 40px 0;
                line-height: 1.6;
            }
            footer {
                background: #2c3e50;
                color: white;
                text-align: center;
                padding: 20px;
                margin-top: 40px;
            }

    </head>
    <body>
        <header><h1>欢迎来到我的个人网站</h1></header>

            </div>
        </div>

    </body>
</html>
